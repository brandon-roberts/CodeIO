syntax = "proto3";
package codeio.vm;

option java_package = "io.codeio.proto.vm";
option java_multiple_files = true;

message ExecuteRequest {
  string vm_id    = 1;
  bytes  bytecode = 2;
  string entry    = 3;
  map<string, string> env = 4;
}

message StackFrame {
  string function   = 1;
  int32  ip         = 2;
  repeated Value locals = 3;
}

message Value {
  oneof kind {
    int64  int_val   = 1;
    double float_val = 2;
    string str_val   = 3;
    bool   bool_val  = 4;
    bytes  blob_val  = 5;
  }
}

message ExecuteResponse {
  Value               result      = 1;
  int32               exit_code   = 2;
  string              stdout      = 3;
  string              stderr      = 4;
  repeated StackFrame call_stack  = 5;
}

service ExecutionService {
  rpc Execute(ExecuteRequest) returns (ExecuteResponse);
  rpc ExecuteStream(ExecuteRequest) returns (stream ExecuteResponse);
}
