syntax = "proto3";
package codeio.vm;

option java_package = "io.codeio.proto.vm";
option java_multiple_files = true;

message VMInitRequest {
  string workspace_id = 1;
  int64  heap_size    = 2;
  int32  stack_depth  = 3;
}

message VMInitResponse {
  string vm_id   = 1;
  bool   success = 2;
}

message VMStats {
  string vm_id          = 1;
  int64  heap_used      = 2;
  int64  heap_capacity  = 3;
  int64  gc_cycles      = 4;
  int64  frames_executed = 5;
}

message VMShutdownRequest  { string vm_id = 1; }
message VMShutdownResponse { bool success  = 1; }
message VMStatsRequest     { string vm_id  = 1; }

service VMControlService {
  rpc Init    (VMInitRequest)     returns (VMInitResponse);
  rpc Stats   (VMStatsRequest)    returns (VMStats);
  rpc Shutdown(VMShutdownRequest) returns (VMShutdownResponse);
}
