# CodeIO Feature Registry — SINGLE SOURCE OF TRUTH for feature status.
#
# Statuses:
#   live     = implemented, compiles, exercised end-to-end
#   building = code exists, not yet working end-to-end
#   planned  = design/theory only
#
# Workflow: when a feature changes state, flip `status` here, then run:
#   python3 tools/scripts/gen_docs.py
# which regenerates FEATURES.md. Never edit FEATURES.md by hand.

